name: Build and Push Worker Docker Image

on:
  push:
    branches:
      - feature/runpodfarm-full-stack
    paths:
      - 'docker/**'
      - 'worker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: may4vfx/runpodfarm-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update RunPod template to new image tag
        run: |
          curl -s -X POST "https://api.runpod.io/graphql?api_key=${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { saveTemplate(input: { id: \"${{ vars.RUNPOD_TEMPLATE_ID }}\", name: \"RunPodFarm Worker\", imageName: \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}\", dockerArgs: \"\", containerDiskInGb: 10, volumeInGb: 0, isPublic: false, startJupyter: false, startSsh: false }) { id imageName } }"
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Template updated: {d[\"data\"][\"saveTemplate\"][\"imageName\"]}')" || echo "Warning: Failed to update RunPod template"
